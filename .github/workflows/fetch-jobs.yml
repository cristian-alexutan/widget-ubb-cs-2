name: Fetch & Match Jobs

on:
  schedule:
    - cron: '0 6 * * 1,3,5'
  workflow_dispatch:

jobs:
  fetch-and-match:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install opencode
        run: npm install -g opencode-ai@latest

      - name: Run all agents
        run: node scripts/fetch_agent_jobs.mjs --all

      - name: Commit & push next_jobs_*.json
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add next_jobs_*.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: update next_jobs_* ($(date -u +%Y-%m-%d))"
            git push
          fi
